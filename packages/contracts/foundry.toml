[fmt]
line_length = 120
tab_width = 2
bracket_spacing = false
int_types = 'long'
quote_style = 'single'
number_underscore = 'thousands'
multiline_func_header = 'params_first_multi'
sort_imports = true

[profile.default]
solc_version = '0.8.28'
libs = ['../../node_modules', 'node_modules', 'lib']
optimizer_runs = 10_000
bytecode_hash = "none"
cbor_metadata = false
fs_permissions = [{ access = "read-write", path = "./deployments/" }]

[profile.sepolia]
solc_version = '0.8.28'
libs = ['../../node_modules', 'node_modules', 'lib']
optimizer_runs = 10_000
bytecode_hash = "none"
cbor_metadata = false
fs_permissions = [{ access = "read-write", path = "./deployments/" }]
# Already-deployed Poseidon libraries on Sepolia (see broadcast/Deploy.s.sol/11155111)
libraries = [
  "../../node_modules/poseidon-solidity/PoseidonT3.sol:PoseidonT3:0x8ffdA7Ed8B4aD98C2C34f54B76821711F4a6f2C5",
  "../../node_modules/poseidon-solidity/PoseidonT4.sol:PoseidonT4:0xe393dd7287Db9982e6f845824854Baf8b8e823AF",
]

[profile.optimized]
via_ir = true
out = 'out-via-ir'

[profile.test]
via_ir = true
out = 'out-via-ir'
# TODO(refactor-merge): legacy suites pending migration to the merged Pool/Registry API.
# Tracked in REFACTOR_MERGE.md. Remove entries as each is migrated.
skip = [
  'test/unit/core/PrivacyPool.t.sol',
  'test/unit/core/Entrypoint.t.sol',
  'test/integration/*',
  'test/invariants/*',
  'test/upgrades/*',
]

[profile.docs]
src = 'src/interfaces/'

[fuzz]
runs = 1000

[rpc_endpoints]
mainnet = "${ETHEREUM_MAINNET_RPC}"
sepolia = "${ETHEREUM_SEPOLIA_RPC}"
gnosis = "${GNOSIS_RPC}"

[etherscan]
mainnet = { key = "${ETHERSCAN_API_KEY}" }
sepolia = { key = "${ETHERSCAN_API_KEY}" }
gnosis = { key = "${ETHERSCAN_API_KEY}" }
